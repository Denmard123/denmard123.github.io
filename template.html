<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DenMard123 | Central Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .glass:hover { transform: translateY(-5px); border-color: rgba(96, 165, 250, 0.5); }
        .gradient-text {
            background: linear-gradient(135deg, #60A5FA 0%, #A78BFA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">
    <header class="max-w-4xl mx-auto px-6 pt-24 pb-16 text-center">
        <div class="inline-block px-4 py-1.5 mb-6 text-[10px] font-bold tracking-widest text-blue-400 uppercase bg-blue-400/10 border border-blue-400/20 rounded-full">
            Main Repository Hub
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
            Selamat Datang di <span class="gradient-text">DenMard123</span>
        </h1>
        <p class="text-lg text-slate-400 max-w-2xl mx-auto leading-relaxed">
            Portal utama yang menghubungkan seluruh ekosistem digital melalui <span class="text-white font-semibold">GitHub Pages</span>.
        </p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="pb-12 text-center border-t border-white/5 pt-8">
        <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em]">© 2026 Den Mardiyana • Fullstack Developer</p>
    </footer>
</body>
</html>
