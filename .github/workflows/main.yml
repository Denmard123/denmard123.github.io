name: Auto-Update Hub
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Berjalan otomatis setiap hari jika ada repo baru

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Run Generator
        run: node generate-hub.js
      - name: Commit & Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add index.html sitemap.xml robots.txt
          git commit -m "Auto-update Hub and SEO Sitemap [skip ci]" || echo "No changes"
          git push
