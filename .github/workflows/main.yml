name: Auto-Update Hub
on:
  push:
    branches: [ main ]
    # Mencegah loop: Jangan jalankan aksi jika yang berubah hanya file hasil generate
    paths-ignore:
      - 'index.html'
      - 'sitemap.xml'
      - 'robots.txt'
  schedule:
    - cron: '0 0 * * *' # Cek repo baru setiap hari jam 12 malam
  workflow_dispatch: # Memungkinkan Anda menjalankan manual lewat tab Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Mengambil history lengkap agar git commit lebih stabil

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Generator
        run: node generate-hub.js

      - name: Commit & Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          # Hanya add file yang benar-benar dihasilkan oleh script
          git add index.html sitemap.xml robots.txt
          # Commit hanya jika ada perbedaan nyata
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 Auto-update Hub: New Repository Detected [skip ci]"
            git push
          fi
